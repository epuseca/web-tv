<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'DM Sans', sans-serif;
        }

        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* SLIDES */
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .slide.active { opacity: 1; }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
        }

        /* LOADING */
        .loading {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            z-index: 10;
            gap: 16px;
            letter-spacing: 0.1em;
        }

        .spinner {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid rgba(255,255,255,0.7);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ERROR */
        .error-message {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: rgba(255,255,255,0.5);
            text-align: center;
            font-size: 14px;
            z-index: 10;
            padding: 40px;
            gap: 12px;
            line-height: 1.7;
        }

        .error-icon {
            font-size: 36px;
            margin-bottom: 8px;
            opacity: 0.4;
        }

        .error-message code {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-top: 8px;
            display: block;
            max-width: 480px;
            text-align: left;
            white-space: pre;
        }

        /* INFO OVERLAY */
        .info-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
            color: white;
            padding: 60px 28px 24px 28px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .info-overlay.show { opacity: 1; }

        .info-name {
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: rgba(255,255,255,0.85);
        }

        /* COUNTER */
        .counter {
            position: absolute;
            top: 20px;
            left: 24px;
            color: rgba(255,255,255,0.45);
            font-size: 12px;
            letter-spacing: 0.15em;
            z-index: 50;
            font-weight: 300;
        }

        /* PROGRESS BAR */
        .progress-bar {
            position: absolute;
            bottom: 0; left: 0;
            height: 2px;
            background: rgba(255,255,255,0.6);
            z-index: 50;
        }

        /* CONTROLS */
        .controls {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .controls.show { opacity: 1; }

        .nav-btn {
            pointer-events: all;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s, transform 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.22);
            transform: scale(1.08);
        }

        /* FULLSCREEN BUTTON */
        .fullscreen-btn {
            position: absolute;
            top: 14px; right: 18px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.7);
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
            z-index: 100;
            opacity: 0;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.18);
            color: white;
        }

        .fullscreen-btn.show { opacity: 1; }

        /* DOTS */
        .dots {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .dots.show { opacity: 1; }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: background 0.3s, transform 0.3s;
            cursor: pointer;
        }

        .dot.active {
            background: rgba(255,255,255,0.85);
            transform: scale(1.3);
        }

        /* EMPTY STATE */
        .empty-state {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: rgba(255,255,255,0.4);
            text-align: center;
            z-index: 10;
            padding: 40px;
            gap: 16px;
        }

        .empty-icon { font-size: 48px; opacity: 0.25; }

        .empty-state h2 {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255,255,255,0.6);
        }

        .empty-state p {
            font-size: 13px;
            line-height: 1.8;
            max-width: 420px;
        }

        .empty-state code {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: rgba(255,255,255,0.65);
            display: block;
            max-width: 480px;
            text-align: left;
            white-space: pre;
            margin-top: 4px;
        }

        @media (max-width: 600px) {
            .nav-btn { width: 38px; height: 38px; font-size: 14px; }
        }
    </style>
</head>

<body>
    <div class="slideshow-container" id="container">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Đang tải ảnh...</span>
        </div>

        <div id="slidesContainer"></div>

        <div class="counter" id="counter"></div>

        <div class="info-overlay" id="infoOverlay">
            <div class="info-name" id="infoName"></div>
        </div>

        <div class="controls" id="controls">
            <button class="nav-btn" id="prevBtn" title="Ảnh trước (←)">&#8592;</button>
            <button class="nav-btn" id="nextBtn" title="Ảnh tiếp (→)">&#8594;</button>
        </div>

        <div class="dots" id="dots"></div>

        <div class="progress-bar" id="progressBar"></div>

        <button class="fullscreen-btn" id="fullscreenBtn" title="Toàn màn hình (F)">⛶</button>
    </div>

    <script src="images.js"></script>
    <script src="script.js"></script>
</body>
</html>
